<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8s Demo App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 2rem; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }
        .info-item:last-child { border-bottom: none; }
        .info-label { color: #666; }
        .info-value { color: #333; font-weight: 500; }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status.healthy { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .items-list { list-style: none; }
        .items-list li {
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
        }
        .items-list li:last-child { border-bottom: none; }
        .checkbox {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 12px;
            border: 2px solid #ddd;
        }
        .checkbox.checked { background: #667eea; border-color: #667eea; }
        .loading { text-align: center; color: #666; padding: 20px; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
        button:hover { background: #5a6fd6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 K8s Demo Application</h1>
        <p class="subtitle">Frontend + Backend running on Kubernetes</p>
        
        <div class="card">
            <h3>Backend Status</h3>
            <div id="backend-status"><p class="loading">Checking connection...</p></div>
        </div>
        
        <div class="card">
            <h3>Backend Info</h3>
            <div id="backend-info"><p class="loading">Loading...</p></div>
        </div>
        
        <div class="card">
            <h3>Learning Progress</h3>
            <div id="items-list"><p class="loading">Loading...</p></div>
        </div>
        
        <button onclick="refreshData()">Refresh Data</button>
    </div>

    <script>
        const isLocal = window.location.origin.includes('localhost') || 
                        window.location.origin.includes('127.0.0.1');
        const BACKEND_URL = isLocal ? 'http://localhost:8080' : window.location.origin;
        
        async function checkHealth() {
            const container = document.getElementById('backend-status');
            try {
                const response = await fetch(`${BACKEND_URL}/health`);
                const data = await response.json();
                container.innerHTML = `
                    <div class="info-item">
                        <span class="info-label">Status</span>
                        <span class="status healthy">${data.status}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Timestamp</span>
                        <span class="info-value">${new Date(data.timestamp).toLocaleString()}</span>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `
                    <div class="info-item">
                        <span class="info-label">Status</span>
                        <span class="status error">Connection Failed</span>
                    </div>
                `;
            }
        }
        
        async function fetchInfo() {
            const container = document.getElementById('backend-info');
            try {
                const response = await fetch(`${BACKEND_URL}/api/info`);
                const data = await response.json();
                container.innerHTML = `
                    <div class="info-item">
                        <span class="info-label">Message</span>
                        <span class="info-value">${data.message}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Environment</span>
                        <span class="info-value">${data.environment}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Pod Hostname</span>
                        <span class="info-value">${data.hostname}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Version</span>
                        <span class="info-value">${data.version}</span>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<p class="loading">Failed to load</p>`;
            }
        }
        
        async function fetchItems() {
            const container = document.getElementById('items-list');
            try {
                const response = await fetch(`${BACKEND_URL}/api/items`);
                const data = await response.json();
                container.innerHTML = `
                    <ul class="items-list">
                        ${data.items.map(item => `
                            <li>
                                <div class="checkbox ${item.completed ? 'checked' : ''}"></div>
                                ${item.name}
                            </li>
                        `).join('')}
                    </ul>
                `;
            } catch (error) {
                container.innerHTML = `<p class="loading">Failed to load</p>`;
            }
        }
        
        function refreshData() {
            checkHealth();
            fetchInfo();
            fetchItems();
        }
        
        refreshData();
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
