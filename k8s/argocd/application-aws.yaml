apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-aws
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/YOUR_USERNAME/k8s-demo-app.git
    targetRevision: main
    path: k8s/overlays/aws
    
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-app
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
