apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-app

resources:
  - ../../base/namespace.yaml
  - ../../base/configmap.yaml
  - ../../base/backend-deployment.yaml
  - ../../base/backend-service.yaml
  - ../../base/frontend-deployment.yaml
  - ../../base/frontend-service.yaml
  - ingress-aws.yaml

commonLabels:
  environment: aws

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
    target:
      kind: Deployment
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
    target:
      kind: Deployment

images:
  - name: demo-backend
    newName: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/demo-backend
    newTag: latest
  - name: demo-frontend
    newName: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/demo-frontend
    newTag: latest
